<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduSchedule Pro — Interface Test</title>
<style>
  :root {
    --primary: #4F46E5;
    --success: #10B981;
    --danger:  #EF4444;
    --warning: #F59E0B;
    --dark:    #1E293B;
    --gray:    #64748B;
    --light:   #F8FAFC;
    --border:  #E2E8F0;
    --white:   #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--light);
    color: var(--dark);
    display: flex;
    min-height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    background: var(--dark);
    color: white;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    position: fixed;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .sidebar-logo h2 { font-size: 1.1rem; font-weight: 800; }
  .sidebar-logo p  { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 0.2rem; }

  .sidebar-section {
    padding: 0.75rem 1.25rem 0.25rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.35);
    margin-top: 0.5rem;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 1.25rem;
    color: rgba(255,255,255,0.7);
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    cursor: pointer;
    font-size: 0.875rem;
    transition: all 0.15s;
  }

  .nav-btn:hover { background: rgba(255,255,255,0.08); color: white; }
  .nav-btn.active { background: rgba(79,70,229,0.3); color: white; border-left: 3px solid var(--primary); }

  .sidebar-user {
    margin-top: auto;
    padding: 1rem 1.25rem;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 0.8rem;
  }

  .sidebar-user .role { color: rgba(255,255,255,0.5); font-size: 0.7rem; text-transform: capitalize; }

  /* ── Main ── */
  .main {
    margin-left: 240px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── Login ── */
  #login-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1e293b 0%, #4F46E5 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .login-card {
    background: white;
    border-radius: 16px;
    padding: 2.5rem;
    width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .login-logo { text-align: center; margin-bottom: 2rem; }
  .login-logo .icon { font-size: 3rem; }
  .login-logo h1 { font-size: 1.5rem; font-weight: 800; margin-top: 0.5rem; }
  .login-logo p  { color: var(--gray); font-size: 0.875rem; }

  /* ── Composants ── */
  .card {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .card-title { font-size: 1rem; font-weight: 700; }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .page-title   { font-size: 1.5rem; font-weight: 800; }
  .page-subtitle { color: var(--gray); font-size: 0.875rem; margin-top: 0.2rem; }

  .content { padding: 1.5rem; flex: 1; }

  .form-group   { margin-bottom: 1rem; }
  .form-label   { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.35rem; }
  .form-control {
    width: 100%; padding: 0.5rem 0.75rem;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.875rem; outline: none;
    transition: border-color 0.2s;
  }
  .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }

  .btn {
    padding: 0.5rem 1.25rem;
    border: none; border-radius: 8px;
    cursor: pointer; font-size: 0.875rem; font-weight: 600;
    display: inline-flex; align-items: center; gap: 0.5rem;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary   { background: var(--primary); color: white; }
  .btn-success   { background: var(--success); color: white; }
  .btn-danger    { background: var(--danger);  color: white; }
  .btn-warning   { background: var(--warning); color: white; }
  .btn-secondary { background: white; color: var(--dark); border: 1px solid var(--border); }
  .btn-sm        { padding: 0.3rem 0.75rem; font-size: 0.8rem; }
  .btn:disabled  { opacity: 0.5; cursor: not-allowed; }

  .badge {
    padding: 0.2rem 0.6rem; border-radius: 20px;
    font-size: 0.75rem; font-weight: 700;
  }
  .badge-success { background: #d1fae5; color: #065f46; }
  .badge-warning { background: #fef3c7; color: #92400e; }
  .badge-danger  { background: #fee2e2; color: #991b1b; }
  .badge-primary { background: #ede9fe; color: #5b21b6; }
  .badge-gray    { background: #f1f5f9; color: #475569; }

  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  thead tr { background: var(--light); }
  thead th {
    padding: 0.7rem 1rem; text-align: left;
    font-weight: 700; color: var(--gray);
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem; text-transform: uppercase;
  }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: var(--light); }
  tbody td { padding: 0.7rem 1rem; }

  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: white;
    border-radius: 12px;
    padding: 1.25rem;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .stat-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; flex-shrink: 0;
  }

  .stat-value { font-size: 1.75rem; font-weight: 800; }
  .stat-label { font-size: 0.78rem; color: var(--gray); }

  .toast {
    position: fixed; top: 1rem; right: 1rem;
    padding: 0.75rem 1.5rem;
    border-radius: 10px; color: white;
    font-weight: 600; z-index: 9999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    animation: slideIn 0.3s ease;
    max-width: 350px;
  }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }

  .error-box {
    background: #fee2e2; color: #991b1b;
    padding: 0.75rem; border-radius: 8px;
    margin-bottom: 1rem; font-size: 0.875rem;
  }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; padding: 1rem;
  }

  .modal-box {
    background: white; border-radius: 14px;
    padding: 2rem; width: 100%;
    max-width: 500px; max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  .modal-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 1.5rem;
  }

  .modal-close {
    background: none; border: none;
    font-size: 1.5rem; cursor: pointer; color: var(--gray);
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 2rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center; padding: 3rem; color: var(--gray);
  }

  .demo-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.5rem; margin-top: 1rem;
  }

  .demo-btn {
    background: var(--light);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 0.5rem 0.75rem;
    cursor: pointer; text-align: left;
    font-size: 0.78rem; transition: background 0.15s;
    display: flex; flex-direction: column; gap: 0.1rem;
  }
  .demo-btn:hover { background: #e2e8f0; }
  .demo-btn strong { color: var(--dark); }
  .demo-btn span   { color: var(--gray); }

  .hidden { display: none !important; }

  .grille-hebdo {
    display: grid;
    grid-template-columns: 60px repeat(6, 1fr);
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: white;
  }

  .grille-header {
    padding: 0.6rem; text-align: center;
    font-weight: 700; font-size: 0.8rem;
    background: var(--light);
    border-bottom: 2px solid var(--border);
    border-right: 1px solid var(--border);
  }

  .grille-heure {
    padding: 0.4rem; font-size: 0.7rem;
    color: var(--gray); text-align: right;
    border-bottom: 1px solid #f1f5f9;
    border-right: 1px solid var(--border);
    background: var(--light);
  }

  .grille-cell {
    border-bottom: 1px solid #f1f5f9;
    border-right: 1px solid var(--border);
    min-height: 45px; position: relative;
  }

  .creneau-chip {
    position: absolute; inset: 2px;
    border-radius: 6px; padding: 3px 6px;
    color: white; font-size: 0.7rem;
    cursor: pointer; overflow: hidden;
  }

  .sign-canvas {
    border: 2px dashed var(--border);
    border-radius: 8px; cursor: crosshair;
    touch-action: none; background: white;
    width: 100%; height: 150px;
    display: block;
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     ÉCRAN DE LOGIN
══════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">📅</div>
      <h1>EduSchedule Pro</h1>
      <p>ISGE-BF — Réseaux et Télécoms</p>
    </div>

    <div id="login-error" class="error-box hidden"></div>

    <div class="form-group">
      <label class="form-label">Adresse email</label>
      <input type="email" class="form-control" id="inp-email" placeholder="votre@email.bf" value="admin@isge.bf" />
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" class="form-control" id="inp-password" placeholder="••••••••" value="Admin@2026" />
    </div>
    <button class="btn btn-primary" id="btn-login" onclick="doLogin()" style="width:100%;padding:0.75rem;margin-top:0.5rem">
      🔐 Se connecter
    </button>

    <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)">
      <p style="font-size:0.8rem;color:var(--gray);text-align:center;margin-bottom:0.5rem">Comptes de démonstration</p>
      <div class="demo-grid">
        <button class="demo-btn" onclick="setDemo('admin@isge.bf','Admin@2026')"><strong>👑 Admin</strong><span>admin@isge.bf</span></button>
        <button class="demo-btn" onclick="setDemo('cbere@isge.bf','Enseignant@2026')"><strong>👨‍🏫 Enseignant</strong><span>cbere@isge.bf</span></button>
        <button class="demo-btn" onclick="setDemo('delegue.l3@isge.bf','Delegue@2026')"><strong>📓 Délégué</strong><span>delegue.l3@isge.bf</span></button>
        <button class="demo-btn" onclick="setDemo('surveillant@isge.bf','Surveillant@2026')"><strong>👁️ Surveillant</strong><span>surveillant@isge.bf</span></button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     APP PRINCIPALE
══════════════════════════════════════════════════════════ -->
<div id="app" class="hidden" style="display:flex;width:100%">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>📅 EduSchedule</h2>
      <p>Pro — ISGE-BF RST</p>
    </div>

    <nav style="padding:0.5rem 0;flex:1">
      <div class="sidebar-section">Principal</div>
      <button class="nav-btn active" onclick="showPage('dashboard')">🏠 Tableau de bord</button>
      <button class="nav-btn" onclick="showPage('emploi-temps')">📅 Emploi du temps</button>
      <button class="nav-btn" onclick="showPage('pointage')">📱 Pointage QR</button>
      <button class="nav-btn" onclick="showPage('cahiers')">📓 Cahier de texte</button>
      <button class="nav-btn" onclick="showPage('vacations')">💰 Vacations</button>
      <button class="nav-btn" onclick="showPage('rapports')">📊 Rapports</button>

      <div class="sidebar-section" id="section-ref">Référentiels</div>
      <button class="nav-btn" id="nav-classes" onclick="showPage('classes')">🏫 Classes</button>
      <button class="nav-btn" id="nav-enseignants" onclick="showPage('enseignants')">👨‍🏫 Enseignants</button>
      <button class="nav-btn" id="nav-matieres" onclick="showPage('matieres')">📚 Matières</button>
      <button class="nav-btn" id="nav-salles" onclick="showPage('salles')">🚪 Salles</button>
    </nav>

    <div class="sidebar-user">
      <div id="sidebar-nom" style="font-weight:700;color:white;font-size:0.875rem"></div>
      <div id="sidebar-role" class="role"></div>
      <button class="btn btn-secondary btn-sm" style="width:100%;margin-top:0.5rem" onclick="doLogout()">🚪 Déconnexion</button>
    </div>
  </aside>

  <!-- Contenu -->
  <main class="main">
    <div class="content" id="page-content">
      <div class="spinner"></div>
    </div>
  </main>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<!-- Modal -->
<div id="modal" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modal-title" style="font-size:1.15rem;font-weight:800"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  Configuration
// ══════════════════════════════════════════════════════════
const API   = 'http://localhost/eduschedulepro/backend/api'
let TOKEN   = localStorage.getItem('edu_token') || ''
let USER    = JSON.parse(localStorage.getItem('edu_user') || 'null')
let CURRENT = 'dashboard'

const COULEURS = ['#4F46E5','#0891B2','#059669','#D97706','#DC2626','#7C3AED','#DB2777']
const JOURS    = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi']
const HEURES   = ['07h','08h','09h','10h','11h','12h','13h','14h','15h','16h','17h','18h']
const MOIS_NOM = ['','Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre']

// ══════════════════════════════════════════════════════════
//  API Helper
// ══════════════════════════════════════════════════════════
async function api(method, path, body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` }
  }
  if (body) opts.body = JSON.stringify(body)
  try {
    const res  = await fetch(API + path, opts)
    const data = await res.json()
    if (res.status === 401) { doLogout(); return null }
    return data
  } catch (e) {
    showToast('❌ Erreur réseau — WAMP démarré ?', 'danger')
    return null
  }
}

// ══════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════
function setDemo(email, pwd) {
  document.getElementById('inp-email').value    = email
  document.getElementById('inp-password').value = pwd
}

async function doLogin() {
  const email    = document.getElementById('inp-email').value.trim()
  const password = document.getElementById('inp-password').value.trim()
  const errBox   = document.getElementById('login-error')
  const btn      = document.getElementById('btn-login')

  errBox.classList.add('hidden')
  btn.disabled   = true
  btn.textContent = '⏳ Connexion...'

  const data = await fetch(API + '/auth/login', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ email, password })
  }).then(r => r.json()).catch(() => null)

  btn.disabled   = false
  btn.textContent = '🔐 Se connecter'

  if (data?.success) {
    TOKEN = data.token
    USER  = data.user
    localStorage.setItem('edu_token', TOKEN)
    localStorage.setItem('edu_user',  JSON.stringify(USER))
    initApp()
  } else {
    errBox.textContent = '⚠️ ' + (data?.error || 'Identifiants incorrects.')
    errBox.classList.remove('hidden')
  }
}

function doLogout() {
  TOKEN = ''
  USER  = null
  localStorage.removeItem('edu_token')
  localStorage.removeItem('edu_user')
  document.getElementById('app').classList.add('hidden')
  document.getElementById('login-screen').style.display = 'flex'
}

document.getElementById('inp-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin()
})

// ══════════════════════════════════════════════════════════
//  Init App
// ══════════════════════════════════════════════════════════
function initApp() {
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app').classList.remove('hidden')
  document.getElementById('sidebar-nom').textContent  = USER?.nom_complet || USER?.email
  document.getElementById('sidebar-role').textContent = USER?.role

  // Masquer référentiels si pas admin
  if (USER?.role !== 'admin') {
    document.getElementById('section-ref').classList.add('hidden')
    ;['classes','enseignants','matieres','salles'].forEach(id => {
      document.getElementById('nav-' + id)?.classList.add('hidden')
    })
  }

  showPage('dashboard')
}

// Auto-login si token existant
if (TOKEN && USER) initApp()

// ══════════════════════════════════════════════════════════
//  Navigation
// ══════════════════════════════════════════════════════════
function showPage(page) {
  CURRENT = page
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
  document.querySelectorAll('.nav-btn').forEach(b => {
    if (b.getAttribute('onclick')?.includes(`'${page}'`)) b.classList.add('active')
  })
  const pages = {
    'dashboard':    renderDashboard,
    'emploi-temps': renderEmploiTemps,
    'pointage':     renderPointage,
    'cahiers':      renderCahiers,
    'vacations':    renderVacations,
    'rapports':     renderRapports,
    'classes':      renderClasses,
    'enseignants':  renderEnseignants,
    'matieres':     renderMatieres,
    'salles':       renderSalles,
  }
  const fn = pages[page]
  if (fn) fn()
}

// ══════════════════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════════════════
async function renderDashboard() {
  setContent('<div class="spinner"></div>')
  const data = await api('GET', '/dashboard/stats')
  if (!data?.success) { setContent('<div class="empty">❌ Impossible de charger le dashboard.</div>'); return }
  const d = data.data

  let html = `
  <div class="page-header">
    <div>
      <h1 class="page-title">🏠 Tableau de bord</h1>
      <p class="page-subtitle">Bienvenue, ${USER?.nom_complet || USER?.email} — ${USER?.role}</p>
    </div>
    <button class="btn btn-secondary" onclick="renderDashboard()">🔄 Actualiser</button>
  </div>`

  if (USER?.role === 'admin') {
    const kpis = [
      { icon:'📅', label:"Séances aujourd'hui", val: d.seances_jour||0,        bg:'#EEF2FF', c:'#4F46E5' },
      { icon:'✅', label:'Pointages du jour',    val: d.pointages_jour||0,      bg:'#D1FAE5', c:'#059669' },
      { icon:'⚠️', label:'Retards du jour',       val: d.retards_jour||0,        bg:'#FEF3C7', c:'#D97706' },
      { icon:'📓', label:'Cahiers non clôturés', val: d.cahiers_non_clos||0,   bg:'#FEE2E2', c:'#EF4444' },
      { icon:'💰', label:'Vacations en attente', val: d.vacations_attente||0,   bg:'#F0FDF4', c:'#16A34A' },
      { icon:'👨‍🏫', label:'Enseignants actifs',   val: d.enseignants_actifs||0,  bg:'#F0F9FF', c:'#0284C7' },
    ]
    html += '<div class="stats-grid">'
    kpis.forEach(k => {
      html += `<div class="stat-card">
        <div class="stat-icon" style="background:${k.bg}">${k.icon}</div>
        <div>
          <div class="stat-value" style="color:${k.c}">${k.val}</div>
          <div class="stat-label">${k.label}</div>
        </div>
      </div>`
    })
    html += '</div>'

    if (d.stats_classes?.length) {
      html += `<div class="card"><div class="card-header"><h3 class="card-title">📊 Séances par classe cette semaine</h3></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Classe</th><th>Planifiées</th><th>Réalisées</th><th>Taux</th></tr></thead>
        <tbody>`
      d.stats_classes.forEach(c => {
        const taux = c.seances_planifiees > 0 ? Math.round((c.seances_realisees / c.seances_planifiees) * 100) : 0
        const color = taux >= 80 ? '#10b981' : taux >= 50 ? '#f59e0b' : '#ef4444'
        html += `<tr>
          <td><strong>${c.classe}</strong></td>
          <td>${c.seances_planifiees}</td>
          <td>${c.seances_realisees}</td>
          <td>
            <div style="display:flex;align-items:center;gap:0.5rem">
              <div style="flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden">
                <div style="width:${taux}%;height:100%;background:${color};border-radius:4px"></div>
              </div>
              <span style="font-weight:700;font-size:0.8rem">${taux}%</span>
            </div>
          </td>

      })
      html += '</tbody></table></div></div>'

  } else if (USER?.role === 'enseignant') {
    html += `<div class="card"><div class="card-header"><h3 class="card-title">📅 Mes séances de la semaine</h3></div>`
    if (!d.seances_semaine?.length) {
      html += '<div class="empty">Aucune séance cette semaine.</div>'
    } else {
      html += `<div class="table-wrap"><table>
        <thead><tr><th>Jour</th><th>Horaire</th><th>Matière</th><th>Classe</th><th>Salle</th><th>Statut</th></tr></thead>
        <tbody>`
      d.seances_semaine.forEach(s => {
        const badge = s.statut === 'terminé' ? 'success' : s.statut === 'en_cours' ? 'warning' : 'gray'
        html += `<tr>
          <td><strong>${s.jour}</strong></td>
          <td>${s.heure_debut?.substring(0,5)} – ${s.heure_fin?.substring(0,5)}</td>
          <td>${s.matiere}</td><td>${s.classe}</td><td>${s.salle}</td>
          <td><span class="badge badge-${badge}">${s.statut}</span></td>
        </tr>`
      })
      html += '</tbody></table></div>'
    }
    html += `</div>
    <div class="card"><div class="card-header"><h3 class="card-title">💰 Mes fiches de vacation</h3></div>`
    if (!d.fiches_vacation?.length) {
      html += '<div class="empty">Aucune fiche générée.</div>'
    } else {
      html += `<div class="table-wrap"><table>
        <thead><tr><th>Période</th><th>Séances</th><th>Heures</th><th>Montant net</th><th>Statut</th></tr></thead><tbody>`
      d.fiches_vacation.forEach(f => {
        html += `<tr>
          <td>${MOIS_NOM[f.mois]} ${f.annee}</td>
          <td>${f.nb_seances}</td>
          <td>${parseFloat(f.total_heures||0).toFixed(1)}h</td>
          <td><strong>${parseInt(f.montant_net||0).toLocaleString()} FCFA</strong></td>
          <td><span class="badge badge-${f.statut==='approuvée'?'success':'warning'}">${f.statut}</span></td>
        </tr>`
      })
      html += '</tbody></table></div>'
    }
    html += '</div>'
  } else {
    html += `<div class="card"><div class="empty">
      <div style="font-size:3rem">👋</div>
      <p style="margin-top:1rem">Bienvenue sur EduSchedule Pro !</p>
      <p style="margin-top:0.5rem">Utilisez le menu de gauche pour naviguer.</p>
    </div></div>`
  }

  setContent(html)
}

async function renderEmploiTemps() {
  setContent('<div class="spinner"></div>')
  const classes = await api('GET', '/classes')
  if (!classes?.success) { setContent('<div class="empty">❌ Erreur de chargement.</div>'); return }

  const cl = classes.data || []
  const firstId = cl[0]?.id || ''

  let html = `
  <div class="page-header">
    <div><h1 class="page-title">📅 Emploi du Temps</h1><p class="page-subtitle">Planning hebdomadaire</p></div>
    ${USER?.role==='admin' ? `<button class="btn btn-primary" onclick="modalCreerCreneau()">+ Ajouter créneau</button>` : ''}
  </div>
  <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap">
    <select class="form-control" id="sel-classe" style="width:250px" onchange="loadGrille()">
      ${cl.map(c => `<option value="${c.id}">${c.libelle}</option>`).join('')}
    </select>
    <div style="display:flex;align-items:center;gap:0.75rem;background:white;padding:0.4rem 0.75rem;border-radius:8px;border:1px solid var(--border)">
      <button class="btn btn-secondary btn-sm" onclick="navSemaine(-1)">◀</button>
      <span id="label-semaine" style="font-weight:700;min-width:200px;text-align:center">—</span>
      <button class="btn btn-secondary btn-sm" onclick="navSemaine(1)">▶</button>
    </div>
    <button class="btn btn-secondary" onclick="loadGrille()">🔄</button>
  </div>
  <div id="grille-container"><div class="spinner"></div></div>`

  setContent(html)

  // Date de la semaine courante (lundi)
  window._semaine = getLundi(new Date())
  document.getElementById('label-semaine').textContent = 'Semaine du ' + formatDate(window._semaine)

  loadGrille()
}

async function loadGrille() {
  const idClasse = document.getElementById('sel-classe')?.value
  if (!idClasse) return

  const semaine  = window._semaine || getLundi(new Date())
  document.getElementById('label-semaine').textContent = 'Semaine du ' + formatDate(semaine)

  const res = await api('GET', `/emploi-temps?id_classe=${idClasse}&semaine=${semaine}`)
  const ets  = res?.data || []

  if (!ets.length) {
    document.getElementById('grille-container').innerHTML = `
    <div class="card"><div class="empty">
      <div style="font-size:2rem">📭</div>
      <p>Aucun emploi du temps pour cette semaine.</p>
      ${USER?.role==='admin' ? `<button class="btn btn-primary" style="margin-top:1rem" onclick="modalCreerET()">Créer un planning</button>` : ''}
    </div></div>`
    return
  }

  const detail = await api('GET', `/emploi-temps/${ets[0].id}`)
  const creneaux = detail?.data?.creneaux || []
  const et = detail?.data

  // Grille
  let grilleHtml = `<div style="margin-bottom:0.5rem;display:flex;gap:0.5rem;align-items:center">`
  if (et) {
    const pubBadge = et.statut_publication === 'publié' ? 'success' : 'warning'
    grilleHtml += `<span class="badge badge-${pubBadge}">${et.statut_publication}</span>`
    grilleHtml += `<span style="font-size:0.8rem;color:var(--gray)">${creneaux.length} créneau(x)</span>`
    if (USER?.role==='admin') {
      grilleHtml += `<button class="btn btn-secondary btn-sm" onclick="publierET(${et.id})">${et.statut_publication==='publié'?'🔒 Dépublier':'🌐 Publier'}</button>`
      grilleHtml += `<button class="btn btn-secondary btn-sm" onclick="dupliquerET(${et.id})">📋 Dupliquer</button>`
    }
  }
  grilleHtml += '</div>'

  grilleHtml += `<div class="grille-hebdo" style="font-size:0.75rem">`

  // Headers
  grilleHtml += `<div class="grille-header" style="background:var(--dark);color:white">Heure</div>`
  JOURS.forEach(j => {
    grilleHtml += `<div class="grille-header" style="background:var(--dark);color:white">${j}</div>`
  })

  // Lignes heures
  HEURES.forEach((h, hi) => {
    grilleHtml += `<div class="grille-heure">${h}</div>`
    JOURS.forEach((jour, ji) => {
      const cs = creneaux.filter(c => c.jour === jour && parseInt(c.heure_debut) === (hi + 7))
      let cellHtml = ''
      cs.forEach(c => {
        const color = COULEURS[(c.id_matiere-1) % COULEURS.length]
        cellHtml += `<div class="creneau-chip" style="background:${color}" title="${c.matiere} - ${c.enseignant}">
          <div style="font-weight:700">${c.type_seance}</div>
          <div>${c.matiere?.substring(0,15)}</div>
          <div style="opacity:0.85">${c.salle}</div>
          ${USER?.role==='admin' ? `<button onclick="deleteCreneau(${c.id})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.3);border:none;color:white;border-radius:3px;cursor:pointer;font-size:10px;padding:1px 3px">✕</button>` : ''}
        </div>`
      })
      grilleHtml += `<div class="grille-cell">${cellHtml}</div>`
    })
  })

  grilleHtml += '</div>'

  document.getElementById('grille-container').innerHTML = `<div class="card" style="padding:1rem">${grilleHtml}</div>`
}

function navSemaine(dir) {
  const d = new Date(window._semaine)
  d.setDate(d.getDate() + dir * 7)
  window._semaine = getLundi(d)
  loadGrille()
}

async function publierET(id) {
  const r = await api('PUT', `/emploi-temps/${id}/publier`)
  if (r?.success) { showToast('✅ ' + r.message); loadGrille() }
}

async function dupliquerET(id) {
  if (!confirm('Dupliquer vers la semaine suivante ?')) return
  const r = await api('POST', `/emploi-temps/${id}/dupliquer`)
  if (r?.success) { showToast('✅ ' + r.message, 'success'); window._semaine = r.data.semaine_debut; loadGrille() }
  else showToast('❌ ' + r?.error, 'danger')
}

async function deleteCreneau(id) {
  if (!confirm('Supprimer ce créneau ?')) return
  const r = await api('DELETE', `/creneaux/${id}`)
  if (r?.success) { showToast('✅ Créneau supprimé'); loadGrille() }
}

async function submitCreerCreneau(etId) {
  const r = await api('POST', '/creneaux', {

}

async function renderPointage() {
  const today = new Date().toISOString().split('T')[0]
  const pts   = await api('GET', `/pointages?date=${today}`)
  const list  = pts?.data || []

  let html = `
  <div class="page-header">
    <div><h1 class="page-title">📱 Pointage QR-Code</h1></div>
  </div>
  <div class="card" style="max-width:500px;margin-bottom:1rem">
    <div class="card-header"><h3 class="card-title">🔍 Scanner / Saisir un token QR</h3></div>
    <div class="form-group">
      <label class="form-label">Token QR</label>
      <input class="form-control" id="inp-token" placeholder="Coller le token QR ici...">
      <small style="color:var(--gray);font-size:0.75rem">Extrait automatiquement de l'URL du QR-Code</small>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doPointage()">✅ Valider le pointage</button>
    <div id="pointage-result" style="margin-top:1rem"></div>
  </div>`

  // Générer QR pour un créneau (admin)
  if (USER?.role === 'admin') {
    const creneaux = await api('GET', '/creneaux')
    const cr = creneaux?.data || []
    html += `<div class="card" style="max-width:500px;margin-bottom:1rem">
      <div class="card-header"><h3 class="card-title">📲 Générer un QR-Code</h3></div>
      <div class="form-group"><label class="form-label">Créneau</label>
      <select class="form-control" id="sel-creneau-qr">
        ${cr.map(c=>`<option value="${c.id}">${c.jour} ${c.heure_debut?.substring(0,5)} — ${c.matiere||'?'} (${c.classe||'?'})</option>`).join('')}
      </select></div>
      <button class="btn btn-secondary" onclick="genererQR()">📱 Générer QR-Code</button>
      <div id="qr-result" style="margin-top:1rem"></div>
    </div>`
  }

  html += `<div class="card">
    <div class="card-header">
      <h3 class="card-title">📋 Pointages d'aujourd'hui</h3>
      <button class="btn btn-secondary btn-sm" onclick="renderPointage()">🔄</button>
    </div>`

  if (!list.length) {
    html += '<div class="empty">Aucun pointage enregistré aujourd\'hui.</div>'
  } else {
    html += `<div class="table-wrap"><table>
      <thead><tr><th>Enseignant</th><th>Matière</th><th>Classe</th><th>Prévu</th><th>Réel</th><th>Statut</th></tr></thead>
      <tbody>`
    list.forEach(p => {
      const style = p.statut==='à_l_heure' ? 'success' : p.statut==='retard' ? 'warning' : 'danger'
      html += `<tr>
        <td><strong>${p.enseignant}</strong></td>
        <td>${p.matiere}</td><td>${p.classe}</td>
        <td>${p.heure_debut?.substring(0,5)}</td>
        <td>${new Date(p.heure_pointage_reelle).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</td>
        <td><span class="badge badge-${style}">${p.statut}</span></td>
      </tr>`
    })
    html += '</tbody></table></div>'
  }
  html += '</div>'
  setContent(html)

  // Lire token depuis URL
  const params = new URLSearchParams(window.location.search)
  const tokenUrl = params.get('token')
  if (tokenUrl) document.getElementById('inp-token').value = tokenUrl
}

async function doPointage() {
  const token = document.getElementById('inp-token').value.trim()
  if (!token) return
  const r = await api('POST', '/pointages/scan', { token_qr: token })
  const div = document.getElementById('pointage-result')
  if (r?.success) {
    div.innerHTML = `<div style="background:#d1fae5;color:#065f46;padding:1rem;border-radius:8px">
      ✅ Pointage enregistré ! Heure : <strong>${r.data?.heure_reelle}</strong> — Statut : <strong>${r.data?.statut}</strong>
      ${r.data?.alerte ? `<br>⚠️ ${r.data.alerte}` : ''}
    </div>`
    document.getElementById('inp-token').value = ''
  } else {
    div.innerHTML = `<div style="background:#fee2e2;color:#991b1b;padding:1rem;border-radius:8px">❌ ${r?.error || 'Échec du pointage'}</div>`
  }
}

async function genererQR() {
  const id = document.getElementById('sel-creneau-qr').value
  const r  = await api('GET', `/creneaux/${id}/qr`)
  const div = document.getElementById('qr-result')
  if (r?.success) {
    div.innerHTML = `<div style="background:#d1fae5;color:#065f46;padding:0.75rem;border-radius:8px;font-size:0.85rem">
      ✅ Token généré — expire le <strong>${r.data.expire_le}</strong><br>
      <a href="${r.data.qr_image_url}" target="_blank" style="color:#059669">📷 Voir le QR-Code</a>
    </div>`
  } else {
    div.innerHTML = `<div style="background:#fee2e2;color:#991b1b;padding:0.75rem;border-radius:8px">❌ ${r?.error}</div>`
  }
}

async function voirCahier(id) {
  const res = await api('GET', `/cahiers/${id}`)
  const c   = res?.data
  if (!c) return

  let body = `
  <p><strong>Matière :</strong> ${c.matiere} — <strong>Classe :</strong> ${c.classe}</p>
  <p><strong>Enseignant :</strong> ${c.enseignant}</p>
  <p><strong>Jour :</strong> ${c.jour} ${c.heure_debut?.substring(0,5)}–${c.heure_fin?.substring(0,5)}</p>
  <hr style="margin:1rem 0;border:none;border-top:1px solid var(--border)">`

  if (c.contenu?.points_vus?.length) {
    body += `<p><strong>Points vus :</strong></p><ul style="margin:0.5rem 0 0 1rem;font-size:0.875rem">`
    c.contenu.points_vus.forEach(p => body += `<li>${p}</li>`)
    body += '</ul>'
  }
  if (c.contenu?.niveau_avancement) body += `<p style="margin-top:0.5rem"><strong>Avancement :</strong> ${c.contenu.niveau_avancement}</p>`
  if (c.travaux?.length) {
    body += `<p style="margin-top:0.75rem"><strong>Travaux :</strong></p>`
    c.travaux.forEach(t => {
      body += `<div style="background:var(--light);padding:0.4rem 0.6rem;border-radius:6px;margin-top:0.25rem;font-size:0.85rem">📌 ${t.description} — ${t.type}</div>`
    })

// ── Canvas signature ────────────────────────────────────────
let _drawing = false, _ctx = null, _canvas = null, _signed = false

function initCanvas(id) {
  _canvas = document.getElementById(id)
  if (!_canvas) return
  _ctx = _canvas.getContext('2d')
  _ctx.fillStyle = '#fff'
  _ctx.fillRect(0, 0, _canvas.width, _canvas.height)
  _signed = false
  _canvas.onmousedown  = e => { _drawing=true; _ctx.beginPath(); const p=pos(e); _ctx.moveTo(p.x,p.y) }
  _canvas.onmousemove  = e => { if(!_drawing) return; const p=pos(e); _ctx.lineWidth=2;_ctx.lineCap='round';_ctx.strokeStyle='#1e293b';_ctx.lineTo(p.x,p.y);_ctx.stroke();_signed=true }
  _canvas.onmouseup    = () => _drawing=false
  _canvas.onmouseleave = () => _drawing=false
  _canvas.ontouchstart = e => { _drawing=true; const p=pos(e.touches[0]); _ctx.beginPath();_ctx.moveTo(p.x,p.y); e.preventDefault() }
  _canvas.ontouchmove  = e => { if(!_drawing) return; const p=pos(e.touches[0]);_ctx.lineWidth=2;_ctx.lineCap='round';_ctx.strokeStyle='#1e293b';_ctx.lineTo(p.x,p.y);_ctx.stroke();_signed=true; e.preventDefault() }
  _canvas.ontouchend   = () => _drawing=false
}

function pos(e) {
  const r = _canvas.getBoundingClientRect()
  return { x: (e.clientX||e.pageX) - r.left, y: (e.clientY||e.pageY) - r.top }
}

function clearCanvas() {
  if (_ctx && _canvas) { _ctx.fillStyle='#fff'; _ctx.fillRect(0,0,_canvas.width,_canvas.height); _signed=false }
}

function getSignature() {
  return _signed && _canvas ? _canvas.toDataURL('image/png') : null
}

        <div class="form-group"><label class="form-label">Statut</label><select class="form-control" id="m-statut"><option value="vacataire">Vacataire</option><option value="permanent">Permanent</option></select></div>
        <div class="form-group"><label class="form-label">Taux horaire (FCFA)</label><input type="number" class="form-control" id="m-taux" value="5000"></div>`,
      submit: () => api('POST','/enseignants',{matricule:v('m-mat'),nom:v('m-nom'),prenom:v('m-prenom'),email:v('m-email'),specialite:v('m-spe'),statut:v('m-statut'),taux_horaire:v('m-taux')}),
      reload: 'renderEnseignants'
    }
  }

  const cfg = configs[type]
  openModal(cfg.title, `
    ${cfg.fields}
    <div style="display:flex;justify-content:flex-end;gap:0.75rem;margin-top:0.5rem">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="submitAjouter('${type}')">Enregistrer</button>
    </div>`)

  window._submitFn = cfg.submit
  window._reloadFn = cfg.reload
}

async function submitAjouter(type) {
  const r = await window._submitFn()
  if (r?.success) {
    showToast('✅ Ajouté avec succès !')
    closeModal()
    window[window._reloadFn]()
  } else {
    showToast('❌ ' + r?.error, 'danger')
  }
}

async function supprimerItem(endpoint, id, reload) {
  if (!confirm('Supprimer cet élément ?')) return
  const r = await api('DELETE', `/${endpoint}/${id}`)
  if (r?.success) { showToast('✅ Supprimé.'); window[reload]() }
  else showToast('❌ ' + r?.error, 'danger')
}

// ══════════════════════════════════════════════════════════
//  UTILITAIRES
// ══════════════════════════════════════════════════════════
function setContent(html) {
  document.getElementById('page-content').innerHTML = html
}

function v(id) {
  return document.getElementById(id)?.value || ''
}

function getLundi(date) {
  const d = new Date(date)
  const day = d.getDay()
  d.setDate(d.getDate() - day + (day===0 ? -6 : 1))
  return d.toISOString().split('T')[0]
}

function formatDate(str) {
  if (!str) return ''
  return new Date(str).toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' })
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.style.background = type==='success' ? '#10b981' : type==='warning' ? '#f59e0b' : '#ef4444'
  t.classList.remove('hidden')
  setTimeout(() => t.classList.add('hidden'), 4000)
}

function openModal(title, body) {
  document.getElementById('modal-title').textContent = title
  document.getElementById('modal-body').innerHTML    = body
  document.getElementById('modal').classList.remove('hidden')
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return
  document.getElementById('modal').classList.add('hidden')
}
</script>
