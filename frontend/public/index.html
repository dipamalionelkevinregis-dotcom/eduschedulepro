<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduSchedule Pro — ISGE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* Palette principale — violet/indigo profond */
        --primary:      #6D28D9;
        --primary-d:    #5B21B6;
        --primary-l:    #EDE9FE;
        --primary-m:    #8B5CF6;

        /* Accents */
        --success:      #059669;
        --success-l:    #D1FAE5;
        --danger:       #DC2626;
        --danger-l:     #FEE2E2;
        --warning:      #D97706;
        --warning-l:    #FEF3C7;
        --info:         #0284C7;
        --info-l:       #E0F2FE;
        --teal:         #0D9488;
        --teal-l:       #CCFBF1;
        --rose:         #E11D48;
        --rose-l:       #FFE4E6;
        --orange:       #EA580C;
        --orange-l:     #FFEDD5;

        /* Surfaces */
        --bg:           #F5F3FF;
        --bg2:          #EDE9FE;
        --surface:      #FFFFFF;
        --surface2:     #FAFAFA;
        --border:       #DDD6FE;
        --border-l:     #EDE9FE;

        /* Texte */
        --text:         #1E1B4B;
        --text-2:       #4C1D95;
        --text-3:       #7C3AED;
        --text-4:       #A78BFA;

        /* Sidebar */
        --sidebar-bg:     #1E1B4B;
        --sidebar-accent: #7C3AED;
        --sidebar-hover:  rgba(139,92,246,0.15);

        /* Misc */
        --radius:       12px;
        --radius-sm:    8px;
        --radius-lg:    16px;
        --shadow:       0 1px 3px rgba(109,40,217,0.08), 0 1px 2px rgba(109,40,217,0.04);
        --shadow-md:    0 4px 16px rgba(109,40,217,0.1);
        --shadow-lg:    0 8px 32px rgba(109,40,217,0.15);
        --shadow-glow:  0 0 0 3px rgba(109,40,217,0.15);
      }

      html { font-size: 16px; }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: var(--bg2); }
      ::-webkit-scrollbar-thumb { background: var(--primary-m); border-radius: 99px; }

      /* Animations */
      @keyframes fadeIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
      @keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:none; } }
      @keyframes spin    { to { transform: rotate(360deg); } }
      @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.4} }
      @keyframes shimmer { from{background-position:-200% 0} to{background-position:200% 0} }

      .fade-in  { animation: fadeIn  0.25s ease both; }
      .slide-in { animation: slideIn 0.2s  ease both; }

      /* ── Composants globaux ── */
      .card {
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        border: 1px solid var(--border-l);
      }

      .card-colored {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-m) 100%);
        color: #fff;
        border-radius: var(--radius);
        box-shadow: var(--shadow-md);
      }

      .btn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 9px 18px; border-radius: var(--radius-sm);
        font-weight: 600; font-size: 0.85rem; cursor: pointer;
        border: none; transition: all 0.15s; white-space: nowrap;
        font-family: inherit; line-height: 1;
      }
      .btn:disabled { opacity:0.5; cursor:not-allowed; }

      .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--primary-m));
        color: #fff; box-shadow: 0 4px 12px rgba(109,40,217,0.3);
      }
      .btn-primary:hover:not(:disabled) {
        transform: translateY(-1px); box-shadow: 0 6px 20px rgba(109,40,217,0.4);
        filter: brightness(1.05);
      }
      .btn-success {
        background: linear-gradient(135deg, #059669, #10B981);
        color: #fff; box-shadow: 0 4px 12px rgba(5,150,105,0.3);
      }
      .btn-success:hover:not(:disabled) { transform:translateY(-1px); filter:brightness(1.05); }
      .btn-danger {
        background: linear-gradient(135deg, #DC2626, #EF4444);
        color: #fff; box-shadow: 0 4px 12px rgba(220,38,38,0.3);
      }
      .btn-danger:hover:not(:disabled) { transform:translateY(-1px); filter:brightness(1.05); }
      .btn-warning {
        background: linear-gradient(135deg, #D97706, #F59E0B);
        color: #fff; box-shadow: 0 4px 12px rgba(217,119,6,0.3);
      }
      .btn-warning:hover:not(:disabled) { transform:translateY(-1px); }
      .btn-ghost {
        background: var(--surface); color: var(--text-2);
        border: 1.5px solid var(--border); box-shadow: var(--shadow);
      }
      .btn-ghost:hover:not(:disabled) { background: var(--bg2); border-color: var(--primary-m); }
      .btn-sm { padding: 5px 12px; font-size: 0.78rem; border-radius: 6px; }
      .btn-lg { padding: 13px 28px; font-size: 0.95rem; }
      .btn-icon { padding: 8px; border-radius: 8px; }

      .input {
        width: 100%; padding: 10px 14px;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 0.875rem; font-family: inherit;
        color: var(--text); background: var(--surface);
        transition: all 0.15s; outline: none;
      }
      .input:focus {
        border-color: var(--primary);
        box-shadow: var(--shadow-glow);
        background: #fff;
      }
      .input::placeholder { color: var(--text-4); }

      .label {
        display: block; font-size: 0.8rem; font-weight: 600;
        color: var(--text-2); margin-bottom: 5px;
      }

      /* Badges */
      .badge {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 3px 10px; border-radius: 99px;
        font-size: 0.72rem; font-weight: 600; white-space: nowrap;
      }
      .badge-success { background:var(--success-l); color:var(--success); }
      .badge-danger  { background:var(--danger-l);  color:var(--danger);  }
      .badge-warning { background:var(--warning-l); color:var(--warning); }
      .badge-info    { background:var(--info-l);    color:var(--info);    }
      .badge-primary { background:var(--primary-l); color:var(--primary); }
      .badge-teal    { background:var(--teal-l);    color:var(--teal);    }
      .badge-rose    { background:var(--rose-l);    color:var(--rose);    }
      .badge-orange  { background:var(--orange-l);  color:var(--orange);  }
      .badge-gray    { background:#F1F5F9; color:#64748B; }

      /* Tables */
      table { width:100%; border-collapse:collapse; font-size:0.85rem; }
      thead tr { background: linear-gradient(90deg, var(--primary-l), var(--bg2)); }
      th {
        padding:11px 14px; text-align:left; font-weight:700;
        color:var(--primary); font-size:0.75rem;
        text-transform:uppercase; letter-spacing:0.06em;
        border-bottom:2px solid var(--border);
      }
      td { padding:11px 14px; border-bottom:1px solid var(--border-l); vertical-align:middle; }
      tbody tr { transition:background 0.1s; }
      tbody tr:hover { background:var(--primary-l); }
      tbody tr:last-child td { border-bottom:none; }

      /* Layout helpers */
      .form-grid   { display:grid; gap:14px; }
      .form-grid-2 { grid-template-columns:1fr 1fr; }
      .form-grid-3 { grid-template-columns:1fr 1fr 1fr; }
      .col-span-2  { grid-column:span 2; }
      .col-span-3  { grid-column:span 3; }

      .page-header {
        display:flex; justify-content:space-between; align-items:center;
        margin-bottom:24px; flex-wrap:wrap; gap:12px;
      }
      .page-title  { font-size:1.5rem; font-weight:900; color:var(--text); letter-spacing:-0.02em; }
      .page-sub    { font-size:0.82rem; color:var(--text-4); margin-top:3px; }

      .section-title {
        font-size:0.9rem; font-weight:700; color:var(--primary);
        margin-bottom:14px; display:flex; align-items:center; gap:8px;
        padding-bottom:8px; border-bottom:2px solid var(--border-l);
      }

      .actions { display:flex; gap:6px; flex-wrap:wrap; }

      .empty-state { text-align:center; padding:52px 24px; color:var(--text-4); }
      .empty-state .icon { font-size:3rem; margin-bottom:14px; opacity:0.6; }
      .empty-state p { font-size:0.9rem; }

      /* Stat card gradient */
      .stat-card {
        background: linear-gradient(135deg, #fff 0%, var(--primary-l) 100%);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow);
        transition: all 0.2s;
      }
      .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
        border-color: var(--primary-m);
      }

      /* Panel coloré */
      .panel {
        background: linear-gradient(135deg, var(--primary) 0%, #7C3AED 50%, #A855F7 100%);
        border-radius: var(--radius-lg);
        padding: 24px;
        color: #fff;
        box-shadow: 0 8px 32px rgba(109,40,217,0.35);
      }

      /* Alert */
      .alert { padding:12px 16px; border-radius:var(--radius-sm); font-size:0.83rem; font-weight:500; display:flex; align-items:flex-start; gap:8px; }
      .alert-info    { background:var(--primary-l); color:var(--primary); border:1px solid var(--border); }
      .alert-success { background:var(--success-l); color:var(--success); }
      .alert-danger  { background:var(--danger-l);  color:var(--danger);  }
      .alert-warning { background:var(--warning-l); color:var(--warning); }

      /* Formulaire panel */
      .form-panel {
        background: linear-gradient(135deg, var(--primary-l) 0%, #fff 100%);
        border: 2px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 16px;
      }

      /* Tabs */
      .tab-bar { display:flex; gap:4px; background:var(--bg2); border-radius:10px; padding:4px; }
      .tab { flex:1; padding:8px; border:none; border-radius:8px; cursor:pointer; font-family:inherit; font-weight:600; font-size:0.83rem; transition:all 0.15s; }
      .tab-active { background:var(--surface); color:var(--primary); box-shadow:var(--shadow); }
      .tab-inactive { background:transparent; color:var(--text-4); }
      .tab-inactive:hover { color:var(--primary); background:rgba(255,255,255,0.5); }

      /* Responsive */
      @media (max-width: 640px) {
        .form-grid-2, .form-grid-3 { grid-template-columns:1fr; }
        .col-span-2, .col-span-3 { grid-column:span 1; }
        .page-header { flex-direction:column; align-items:flex-start; }
        .page-title { font-size:1.3rem; }
      }

      /* ══════════════════════════════════════
         RESPONSIVE — Mobile First
      ══════════════════════════════════════ */

      /* Sidebar responsive */
      .sidebar-mobile-hidden { display: flex !important; }

      /* Layout principal */
      .main-layout {
        display: flex;
        min-height: 100vh;
      }

      /* Overlay mobile pour sidebar */
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(30,27,75,0.6);
        z-index: 199;
        backdrop-filter: blur(2px);
      }

      /* Grilles responsive */
      .grid-auto { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
      .grid-2    { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; }
      .grid-3    { display: grid; gap: 14px; grid-template-columns: 1fr 1fr 1fr; }
      .grid-4    { display: grid; gap: 14px; grid-template-columns: repeat(4, 1fr); }

      /* Stack horizontal → vertical sur mobile */
      .flex-wrap-mobile { display: flex; gap: 10px; flex-wrap: wrap; }

      /* Table responsive — scroll horizontal sur mobile */
      .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .table-responsive table { min-width: 600px; }

      /* Card padding adaptatif */
      .card-responsive { padding: 20px; }

      /* ── TABLETTE (max 1024px) ── */
      @media (max-width: 1024px) {
        .grid-4 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr; }
        .form-grid-3 { grid-template-columns: 1fr 1fr; }
        .col-span-3 { grid-column: span 2; }
      }

      /* ── MOBILE (max 768px) ── */
      @media (max-width: 768px) {
        /* Typographie */
        .page-title  { font-size: 1.2rem; }
        .page-sub    { font-size: 0.78rem; }

        /* Grilles */
        .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
        .form-grid-2, .form-grid-3 { grid-template-columns: 1fr; }
        .col-span-2, .col-span-3  { grid-column: span 1; }

        /* Cards */
        .card-responsive { padding: 14px; }

        /* Boutons */
        .btn { padding: 9px 14px; font-size: 0.82rem; }
        .btn-lg { padding: 12px 20px; font-size: 0.9rem; }

        /* Page header */
        .page-header {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }
        .page-header .actions { width: 100%; justify-content: flex-start; }

        /* Tables */
        .table-responsive table { min-width: 500px; }
        th, td { padding: 8px 10px; font-size: 0.78rem; }

        /* Sidebar overlay */
        .sidebar-overlay.active { display: block; }

        /* Input */
        .input { font-size: 16px; } /* Évite le zoom iOS sur focus */

        /* Stats grid */
        .stats-grid { grid-template-columns: 1fr 1fr !important; }
      }

      /* ── PETIT MOBILE (max 480px) ── */
      @media (max-width: 480px) {
        body { font-size: 14px; }

        .page-title { font-size: 1.1rem; }
        .stats-grid { grid-template-columns: 1fr !important; }

        .btn-sm { padding: 5px 10px; font-size: 0.72rem; }

        /* Topbar compact */
        .topbar-title { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Actions en colonne sur très petit écran */
        .actions-mobile-col { flex-direction: column; }
        .actions-mobile-col .btn { width: 100%; justify-content: center; }

        /* Cacher texte sur icônes en mode compact */
        .btn-icon-only span.btn-text { display: none; }
      }

      /* ── IMPRESSION ── */
      @media print {
        .no-print, aside, header { display: none !important; }
        main { padding: 0 !important; }
        .card { box-shadow: none !important; border: 1px solid #ccc !important; }
      }


      /* ── Responsive global ── */
      @media (max-width: 767px) {
        .form-grid-2, .form-grid-3 { grid-template-columns: 1fr !important; }
        .col-span-2, .col-span-3   { grid-column: span 1 !important; }
        .page-header { flex-direction: column; align-items: flex-start; }
        .page-title  { font-size: 1.2rem; }
        .hide-mobile { display: none !important; }
        table { font-size: 0.78rem; }
        th, td { padding: 8px 10px; }
        .card  { border-radius: 10px; }
        .btn   { padding: 8px 14px; font-size: 0.82rem; }
        .actions { gap: 4px; }
        .btn-sm { padding: 4px 9px; font-size: 0.74rem; }
      }

      @media (min-width: 768px) and (max-width: 1023px) {
        .form-grid-3 { grid-template-columns: 1fr 1fr !important; }
        .hide-tablet { display: none !important; }
      }

      @media (min-width: 1024px) {
        .hide-desktop { display: none !important; }
      }

      /* Table responsive — scroll horizontal sur mobile */
      .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .table-responsive table { min-width: 500px; }

      /* Cards responsive grid */
      .grid-auto { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
      .grid-auto-sm { display: grid; gap: 10px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }

      /* ── Dark Mode ── */
      [data-theme="dark"] {
        --primary:      #8B5CF6;
        --primary-d:    #7C3AED;
        --primary-l:    #2D1B69;
        --primary-m:    #A78BFA;
        --bg:           #0F0A1E;
        --bg2:          #1A1033;
        --surface:      #1E1540;
        --surface2:     #251A4E;
        --border:       #3D2D6E;
        --border-l:     #2D1B69;
        --text:         #F3F0FF;
        --text-2:       #C4B5FD;
        --text-3:       #A78BFA;
        --text-4:       #7C3AED;
        --sidebar-bg:   #0A0618;
        --sidebar-accent: #7C3AED;
      }

      [data-theme="dark"] tbody tr:hover { background: #2D1B69; }
      [data-theme="dark"] thead tr { background: linear-gradient(90deg, #2D1B69, #1A1033); }
      [data-theme="dark"] .stat-card { background: linear-gradient(135deg, #1E1540 0%, #2D1B69 100%); }
      [data-theme="dark"] .form-panel { background: linear-gradient(135deg, #2D1B69 0%, #1E1540 100%); }
      [data-theme="dark"] .alert-info { background: #2D1B69; color: #C4B5FD; }
      [data-theme="dark"] .btn-ghost { background: #1E1540; color: #C4B5FD; border-color: #3D2D6E; }
      [data-theme="dark"] .btn-ghost:hover:not(:disabled) { background: #2D1B69; }
      [data-theme="dark"] .input { background: #1E1540; border-color: #3D2D6E; color: #F3F0FF; }
      [data-theme="dark"] .input:focus { background: #251A4E; border-color: var(--primary); }
      [data-theme="dark"] .tab-bar { background: #1A1033; }
      [data-theme="dark"] .tab-active { background: #251A4E; color: #C4B5FD; }
      [data-theme="dark"] .card { background: #1E1540; border-color: #3D2D6E; }
      [data-theme="dark"] td { border-bottom-color: #2D1B69; }
      [data-theme="dark"] th { color: #C4B5FD; border-bottom-color: #3D2D6E; }

      /* Transition fluide */
      *, *::before, *::after {
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
